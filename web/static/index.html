<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arkchive</title>
  <link rel="icon" type="image/png" href="/static/favicon.png" />
  <!-- Apply theme before first paint to avoid flash of wrong theme on launch screen -->
  <script>
    (function () {
      var stored;
      try { stored = localStorage.getItem("arkchive-theme"); } catch (_) {}
      if (stored !== "light" && stored !== "dark") {
        stored = "dark";
        try { localStorage.setItem("arkchive-theme", "dark"); } catch (_) {}
      }
      document.documentElement.setAttribute("data-theme", stored);
    }());
  </script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- ============================================================
       LAUNCH SCREEN — shown on initial page load, fades out when ready
       ============================================================ -->
  <div id="launch-screen">
    <div class="launch-content">
      <div class="launch-logo">
        <img src="/static/logo-dark-vertical.png" alt="Arkchive" class="launch-logo-img" />
      </div>
      <div class="launch-progress-wrap">
        <div class="launch-progress-bar" id="launch-progress-bar"></div>
      </div>
      <div class="launch-status" id="launch-status">Loading…</div>
    </div>
  </div>

  <!-- Toast notification container (bottom-right, screen-reader live region) -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Command palette placeholder (rendered by commandPalette.js) -->
  <div id="command-palette-container"></div>

  <!-- Attachment modal placeholder (rendered by messageDetail.js / attachments.js) -->
  <div id="attachment-modal-container"></div>

  <!-- ============================================================
       APP SHELL — CSS Grid: header / sidebar / content
       ============================================================ -->
  <div class="app-shell">

    <!-- ── HEADER ─────────────────────────────────────────────── -->
    <header id="app-header" class="app-header">
      <!-- Left: hamburger (mobile only) + app logo / name -->
      <div class="header-left">
        <button
          id="hamburger-btn"
          aria-label="Open navigation menu"
          title="Open navigation menu"
          onclick="sidebar.toggle()"
        >☰</button>
        <img src="/static/logo-dark-horizontal.png" alt="Arkchive" class="header-logo-img" />
      </div>

      <!-- Centre: empty, reserved for future use -->
      <div class="header-centre"></div>

      <!-- Right: density toggle, theme toggle, ⌘K hint -->
      <div class="header-actions">
        <!-- Density toggle -->
        <button
          id="density-toggle-btn"
          aria-label="Toggle compact/cozy density"
          title="Toggle density"
        >⊞</button>

        <!-- Theme toggle -->
        <button
          id="theme-toggle-btn"
          aria-label="Switch to light theme"
          title="Switch to light theme"
          data-active="true"
        >🌙</button>

        <!-- ⌘K hint label -->
        <span class="cmd-k-hint" aria-hidden="true">⌘K</span>
      </div>
    </header>

    <!-- ── SIDEBAR ─────────────────────────────────────────────── -->
    <nav id="sidebar" aria-label="Navigation">
      <div class="sidebar-header">
        <button
          id="sidebar-toggle"
          aria-label="Collapse sidebar"
          title="Collapse sidebar"
          aria-expanded="true"
        ></button>
      </div>
      <ul role="list">
        <!-- Populated by sidebar.js -->
      </ul>
      <div class="sidebar-read-filter">
        <!-- Read/unread filter toggle populated by sidebar.js -->
      </div>
      <div class="sidebar-footer">
        <button
          id="log-console-btn"
          class="sidebar-footer-btn"
          title="Open log console"
          aria-label="Open log console"
          onclick="logConsole.open()"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="4,17 10,11 4,5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <span class="sidebar-footer-btn-label">Log Console</span>
        </button>
      </div>
    </nav>

    <!-- ── CONTENT AREA ────────────────────────────────────────── -->
    <main id="content-area" data-reading-pane="right">

      <!-- Message list container -->
      <div id="message-list-container">
        <div id="error-banner" hidden></div>

        <!-- ── LIST TOOLBAR ──────────────────────────────────── -->
        <div id="list-toolbar" class="list-toolbar">

          <!-- Refresh -->
          <button
            id="refresh-btn"
            class="toolbar-btn"
            title="Refresh"
            aria-label="Refresh message list"
            onclick="refreshMessages()"
          >↻</button>

          <!-- Sync split-button -->
          <div class="toolbar-split-btn" id="sync-split-btn">
            <button
              id="sync-primary-btn"
              class="toolbar-btn toolbar-split-primary"
              title="Sync New"
              aria-label="Sync New"
              onclick="runSync('new')"
            >⇄</button>
            <button
              id="sync-toggle-btn"
              class="toolbar-btn toolbar-split-arrow"
              aria-haspopup="true"
              aria-expanded="false"
              aria-label="More sync options"
              onclick="toggleSyncDropdown(event)"
            >▾</button>
            <ul
              id="sync-dropdown"
              class="toolbar-dropdown-menu"
              role="menu"
              hidden
            >
              <li role="menuitem" tabindex="-1" onclick="runSync('new')">⇄ Sync New</li>
              <li role="menuitem" tabindex="-1" onclick="runSync('delta')">⇄ Sync All Delta</li>
              <li role="menuitem" tabindex="-1" onclick="runSync('force')">⇄ Sync All Forced</li>
              <li role="menuitem" tabindex="-1" onclick="runSync('test')">⇄ Sync 10k (test)</li>
            </ul>
          </div>

          <!-- Panel layout dropdown -->
          <div class="toolbar-split-btn" id="panel-split-btn">
            <button
              id="panel-mode-btn"
              class="toolbar-btn toolbar-split-primary"
              title="Cycle reading pane layout"
              aria-label="Cycle reading pane layout"
              onclick="cyclePanelMode()"
            >⬜</button>
            <button
              id="panel-toggle-btn"
              class="toolbar-btn toolbar-split-arrow"
              aria-haspopup="true"
              aria-expanded="false"
              aria-label="Reading pane options"
              onclick="togglePanelDropdown(event)"
            >▾</button>
            <ul
              id="panel-dropdown"
              class="toolbar-dropdown-menu"
              role="menu"
              hidden
            >
              <li role="menuitem" tabindex="-1" data-mode="none"  onclick="setPanelMode('none')">⬜ Off</li>
              <li role="menuitem" tabindex="-1" data-mode="right" onclick="setPanelMode('right')">⬜▐ Right</li>
              <li role="menuitem" tabindex="-1" data-mode="below" onclick="setPanelMode('below')">⬜▄ Below</li>
            </ul>
          </div>

        </div>
        <!-- ── END LIST TOOLBAR ───────────────────────────────── -->

        <div id="filter-bar"></div>

        <div id="search-summary" hidden></div>

        <div id="message-list" role="list"></div>

        <!-- Message detail modal (used when reading pane mode is "none") -->
        <div id="message-detail-overlay" hidden>
          <div id="message-detail"></div>
        </div>
      </div>

      <!-- Vertical resize handle (right pane mode) -->
      <div id="rp-resize-right" aria-hidden="true" title="Drag to resize"></div>

      <!-- Horizontal resize handle (below pane mode) -->
      <div id="rp-resize-below" aria-hidden="true" title="Drag to resize"></div>

      <!-- Reading pane (shown when mode is "right" or "below") -->
      <div id="reading-pane" aria-label="Message preview" role="region">
        <!-- Populated by readingPane.js -->
      </div>

    </main>

  </div><!-- /.app-shell -->

  <!-- Log Console Modal -->
  <div id="log-console-overlay" class="log-console-overlay" hidden aria-modal="true" role="dialog" aria-label="Log Console">
    <div class="log-console-modal">
      <div class="log-console-header">
        <span class="log-console-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="4,17 10,11 4,5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          Log Console
        </span>
        <span id="sync-status-label" class="sync-status-label" hidden></span>
        <div class="log-console-actions">
          <button id="sync-stop-btn" class="log-console-action-btn sync-stop-btn" hidden title="Stop sync" onclick="stopSync()">■ Stop Sync</button>
          <button class="log-console-action-btn" title="Clear log" onclick="logConsole.clear()">Clear</button>
          <button class="log-console-close-btn" title="Close" aria-label="Close log console" onclick="logConsole.close()">✕</button>
        </div>
      </div>
      <pre id="log-console-output" class="log-console-output"></pre>
    </div>
  </div>

  <!-- DB stats footer -->
  <footer id="db-stats-footer" class="db-stats-footer" hidden>
    <span id="db-stats"></span>
  </footer>

  <script src="/static/logConsole.js"></script>

  <!-- ============================================================
       SCRIPTS
       ============================================================ -->
  <!-- themeManager must load before app.js so theme is applied before render -->
  <script src="/static/themeManager.js"></script>
  <script src="/static/api.js"></script>
  <script src="/static/filters.js"></script>
  <script src="/static/attachments.js"></script>
  <script src="/static/messageList.js"></script>
  <script src="/static/messageDetail.js"></script>
  <script src="/static/sidebar.js"></script>
  <script src="/static/readingPane.js"></script>
  <script src="/static/commandPalette.js"></script>
  <script src="/static/toastManager.js"></script>
  <script src="/static/paneResizer.js"></script>
  <script src="/static/app.js"></script>

  <script>
    // Scroll listener: add drop-shadow to header when message list is scrolled
    (function () {
      var header = document.getElementById('app-header');
      var listContainer = document.getElementById('message-list-container');
      if (!header) return;
      function onScroll() {
        var scrollTop = listContainer ? listContainer.scrollTop : window.scrollY;
        if (scrollTop > 0) {
          header.classList.add('scrolled');
        } else {
          header.classList.remove('scrolled');
        }
      }
      if (listContainer) {
        listContainer.addEventListener('scroll', onScroll, { passive: true });
      } else {
        window.addEventListener('scroll', onScroll, { passive: true });
      }
      onScroll();
    }());
  </script>
</body>
</html>
